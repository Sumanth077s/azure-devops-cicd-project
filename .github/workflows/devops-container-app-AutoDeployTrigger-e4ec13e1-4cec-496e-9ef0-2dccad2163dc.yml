name: Trigger auto deployment for devops-container-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/devops-container-app-AutoDeployTrigger-e4ec13e1-4cec-496e-9ef0-2dccad2163dc.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEVOPSCONTAINERAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEVOPSCONTAINERAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEVOPSCONTAINERAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: devopsregistry12345.azurecr.io
          registryUsername: ${{ secrets.DEVOPSCONTAINERAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DEVOPSCONTAINERAPP_REGISTRY_PASSWORD }}
          containerAppName: devops-container-app
          resourceGroup: devops-project-rg
          imageToBuild: devopsregistry12345.azurecr.io/devops-container-app:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


